<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#2C2520">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inner Circle">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Inner Circle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F6F1;
  --bg-warm: #F3F0E8;
  --surface: #FFFFFF;
  --surface-warm: #FDFCF9;
  --surface-elevated: #FFFFFF;
  --border: #E8E3DA;
  --border-light: #F0ECE4;
  --border-accent: #D4C9B8;
  --text: #2C2520;
  --text-secondary: #6B6057;
  --text-tertiary: #A39A8F;
  --text-muted: #C4BAB0;
  --accent: #B8874C;
  --accent-soft: #F5EDE0;
  --accent-glow: rgba(184,135,76,0.12);
  --green: #5E9E7E;
  --green-soft: #E8F2EC;
  --red: #C66B5E;
  --red-soft: #FAEAE7;
  --blue: #6B8EBF;
  --blue-soft: #E8EFF7;
  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --shadow-xs: 0 1px 2px rgba(44,37,32,0.04);
  --shadow-sm: 0 2px 8px rgba(44,37,32,0.06);
  --shadow: 0 4px 16px rgba(44,37,32,0.06), 0 1px 4px rgba(44,37,32,0.04);
  --shadow-lg: 0 8px 32px rgba(44,37,32,0.08), 0 2px 8px rgba(44,37,32,0.04);
  --shadow-xl: 0 16px 48px rgba(44,37,32,0.1), 0 4px 12px rgba(44,37,32,0.06);
  --shadow-inner: inset 0 1px 2px rgba(44,37,32,0.04);
  --font-body: 'Outfit', sans-serif;
  --font-display: 'Playfair Display', Georgia, serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  font-weight: 400;
  letter-spacing: 0.01em;
  -webkit-font-smoothing: antialiased;
}

/* Grain overlay for paper-like texture */
.app::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.35;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}

.app {
  max-width: 520px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
  background: var(--bg);
}

.scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

/* ─── Header ─── */
.header {
  padding: 20px 24px 0;
  flex-shrink: 0;
  background: var(--bg);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-title-text {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--text);
}
.header-title-text span {
  color: var(--accent);
}
.logo-mark {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}
.header-actions { display: flex; gap: 10px; }

/* ─── Buttons ─── */
.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-tertiary);
  transition: all 0.25s var(--ease-out);
  box-shadow: var(--shadow-xs);
}
.icon-btn:active {
  transform: scale(0.93);
  box-shadow: none;
  border-color: var(--border-accent);
  color: var(--text-secondary);
}
.icon-btn.primary {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  box-shadow: var(--shadow-sm);
}
.icon-btn.primary:active {
  background: #3D3530;
}
.icon-btn.wide {
  width: auto;
  padding: 0 18px;
  gap: 8px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.icon-btn.accent {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(184,135,76,0.25);
}

/* ─── Search ─── */
.search-wrap { position: relative; margin-bottom: 18px; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
.search-input {
  width: 100%;
  padding: 12px 14px 12px 42px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: all 0.3s var(--ease-out);
  box-shadow: var(--shadow-inner);
}
.search-input::placeholder { color: var(--text-muted); font-weight: 300; }
.search-input:focus {
  border-color: var(--accent);
  box-shadow: var(--shadow-inner), 0 0 0 3px var(--accent-glow);
}

/* ─── Contact list ─── */
.contact-list { padding: 0 16px 24px; }
.contact-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 12px;
  margin-bottom: 2px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.25s var(--ease-out);
  opacity: 0;
  transform: translateY(12px);
  animation: listReveal 0.5s var(--ease-out) forwards;
}
.contact-item:active {
  background: var(--surface-warm);
  transform: scale(0.98);
}
@keyframes listReveal {
  to { opacity: 1; transform: translateY(0); }
}

/* ─── Avatar ─── */
.avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 16px;
  color: white;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  position: relative;
  letter-spacing: 0.03em;
}
.avatar::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
}
.avatar-lg {
  width: 84px;
  height: 84px;
  font-size: 26px;
  box-shadow: var(--shadow);
  animation: avatarFloat 3s ease-in-out infinite;
}
@keyframes avatarFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
.avatar-lg::after { inset: -4px; border-width: 2px; border-color: var(--accent-soft); }

.contact-info { flex: 1; min-width: 0; }
.contact-name {
  font-weight: 500;
  font-size: 15px;
  margin-bottom: 3px;
  letter-spacing: 0.01em;
}
.contact-sub {
  font-size: 13px;
  color: var(--text-tertiary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 300;
}
.contact-badge {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.relationship-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-soft);
  padding: 3px 10px;
  border-radius: 12px;
  margin-top: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ─── Profile ─── */
.profile-header {
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border-light);
}
.profile-header-title {
  font-weight: 500;
  font-size: 16px;
  flex: 1;
  letter-spacing: 0.01em;
}
.profile-hero {
  padding: 36px 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  animation: heroReveal 0.6s var(--ease-out);
}
@keyframes heroReveal {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.profile-name {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 500;
  margin-top: 18px;
  letter-spacing: -0.01em;
}
.profile-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 5px;
  font-weight: 300;
}
.profile-relationship { margin-top: 8px; }

/* ─── Summary card ─── */
.summary-card {
  margin: 0 24px 20px;
  padding: 20px;
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface-warm) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  animation: cardReveal 0.5s var(--ease-out) 0.15s both;
}
.summary-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0.5;
}
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.summary-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 12px;
}
.summary-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-secondary);
  font-style: italic;
  font-family: var(--font-display);
  font-weight: 400;
}
.summary-refresh {
  margin-left: auto;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 10px;
  font-family: var(--font-body);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: color 0.2s;
}
.summary-refresh:active { color: var(--accent); }
.pulse { animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:1} }

/* ─── Fields ─── */
.section-title {
  padding: 0 24px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 10px;
  margin-top: 8px;
}
.fields-card {
  margin: 0 24px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-xs);
  animation: cardReveal 0.5s var(--ease-out) 0.2s both;
}
.field-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 15px 18px;
  border-bottom: 1px solid var(--border-light);
  font-size: 14px;
  transition: background 0.2s;
}
.field-row:last-child { border-bottom: none; }
.field-icon {
  width: 22px;
  text-align: center;
  color: var(--accent);
  font-size: 14px;
  flex-shrink: 0;
  padding-top: 2px;
  opacity: 0.7;
}
.field-content { flex: 1; min-width: 0; }
.field-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 3px;
}
.field-value {
  color: var(--text);
  line-height: 1.6;
  word-break: break-word;
  font-weight: 400;
}

/* ─── NLP Bar ─── */
.nlp-bar {
  flex-shrink: 0;
  padding: 12px 24px;
  padding-bottom: calc(12px + var(--safe-bottom));
  background: linear-gradient(to top, var(--bg) 60%, transparent);
  border-top: 1px solid var(--border-light);
}
.nlp-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 6px 6px 6px 16px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.3s var(--ease-out), border-color 0.3s;
}
.nlp-inner:focus-within {
  box-shadow: var(--shadow-lg);
  border-color: var(--border-accent);
}
.nlp-input {
  flex: 1;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  background: transparent;
  color: var(--text);
  min-width: 0;
}
.nlp-input::placeholder { color: var(--text-muted); font-weight: 300; }
.nlp-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s var(--ease-out);
}
.nlp-btn:active { transform: scale(0.9); }
.nlp-send {
  background: var(--text);
  color: var(--bg);
  box-shadow: var(--shadow-sm);
}
.nlp-send:disabled { opacity: 0.2; cursor: default; }
.nlp-mic {
  background: var(--surface-warm);
  color: var(--text-tertiary);
  border: 1px solid var(--border);
}
.nlp-mic.recording {
  background: var(--red);
  color: white;
  border-color: var(--red);
  animation: pulse 1s ease-in-out infinite;
  box-shadow: 0 0 0 4px var(--red-soft);
}
.nlp-mode-tag {
  font-size: 9px;
  font-weight: 600;
  color: var(--accent);
  padding: 3px 9px;
  border-radius: 8px;
  background: var(--accent-soft);
  white-space: nowrap;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ─── Tabs ─── */
.tab-bar {
  display: flex;
  margin: 0 24px 16px;
  gap: 4px;
  background: var(--bg-warm);
  border-radius: var(--radius-sm);
  padding: 4px;
}
.tab {
  flex: 1;
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-tertiary);
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: var(--font-body);
  border-radius: 8px;
  transition: all 0.25s var(--ease-out);
  letter-spacing: 0.02em;
  text-align: center;
}
.tab.active {
  color: var(--text);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
}

/* ─── Log ─── */
.log-item {
  display: flex;
  gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.log-item:last-child { border-bottom: none; }
.log-item:hover .log-delete-btn { opacity: 1; }
.log-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  margin-top: 6px;
  flex-shrink: 0;
}
.log-dot.recent { background: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
.log-content { flex: 1; min-width: 0; }
.log-text { color: var(--text-secondary); line-height: 1.6; font-weight: 400; }
.log-time { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-weight: 400; letter-spacing: 0.02em; }
.log-delete-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  flex-shrink: 0;
  align-self: center;
  opacity: 0.4;
  transition: all 0.2s var(--ease-out);
}
.log-delete-btn:hover { opacity: 1; color: var(--red); background: var(--red-soft); }
.log-delete-btn:active { transform: scale(0.9); }
.log-delete-btn svg { width: 12px; height: 12px; }

/* ─── Edit ─── */
.edit-input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: all 0.25s var(--ease-out);
  box-shadow: var(--shadow-inner);
}
.edit-input:focus { border-color: var(--accent); box-shadow: var(--shadow-inner), 0 0 0 3px var(--accent-glow); }
.edit-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.edit-field { padding: 14px 18px; border-bottom: 1px solid var(--border-light); }
.edit-field:last-child { border-bottom: none; }
.edit-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

/* ─── Modal ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(44,37,32,0.35);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: overlayIn 0.3s var(--ease-out);
}
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px;
  padding-bottom: calc(24px + var(--safe-bottom));
  animation: modalSlide 0.4s var(--ease-spring);
  box-shadow: var(--shadow-xl);
}
@keyframes modalSlide { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.modal-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 20px;
  letter-spacing: -0.01em;
}

/* ─── Dropdown ─── */
.dropdown-menu {
  position: absolute; right: 0; top: 48px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  z-index: 300;
  min-width: 200px;
  overflow: hidden;
  animation: dropIn 0.2s var(--ease-spring);
}
@keyframes dropIn { from { opacity: 0; transform: translateY(-8px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
.dropdown-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; font-size: 14px; font-weight: 400;
  cursor: pointer; color: var(--text-secondary);
  border: none; background: none; width: 100%;
  font-family: var(--font-body); text-align: left;
  transition: all 0.2s;
}
.dropdown-item:active { background: var(--bg-warm); color: var(--text); }
.dropdown-divider { height: 1px; background: var(--border-light); margin: 0 18px; }

/* ─── Toast ─── */
.toast {
  position: fixed;
  bottom: calc(84px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  padding: 12px 24px;
  border-radius: 28px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-body);
  z-index: 999;
  animation: toastIn 0.4s var(--ease-spring);
  box-shadow: var(--shadow-lg);
  white-space: nowrap;
  max-width: 90%;
  letter-spacing: 0.02em;
}
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 16px) scale(0.9); } to { opacity: 1; transform: translate(-50%, 0) scale(1); } }

/* ─── Empty state ─── */
.empty-state { text-align: center; padding: 56px 40px; }
.empty-icon {
  width: 64px; height: 64px; margin: 0 auto 18px;
  border-radius: 50%;
  background: var(--bg-warm);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  color: var(--text-muted);
  border: 1px dashed var(--border);
}
.empty-title { font-family: var(--font-display); font-size: 18px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
.empty-sub { font-size: 13px; line-height: 1.6; color: var(--text-muted); font-weight: 300; }

/* ─── Settings ─── */
.settings-section { padding: 0 24px; margin-bottom: 24px; }
.settings-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-xs);
}
.settings-row { padding: 18px; border-bottom: 1px solid var(--border-light); }
.settings-row:last-child { border-bottom: none; }
.settings-label { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.settings-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; font-weight: 300; }
.api-status {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 12px;
  letter-spacing: 0.02em;
}
.api-status.active { background: var(--green-soft); color: var(--green); }
.api-status.inactive { background: var(--bg-warm); color: var(--text-muted); }

.gen-summary-btn {
  width: calc(100% - 48px); margin: 0 24px 20px;
  padding: 14px;
  background: var(--surface);
  border: 1px dashed var(--border-accent);
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.25s var(--ease-out);
}
.gen-summary-btn:active { background: var(--accent-soft); border-style: solid; }

/* ─── Provider radio ─── */
.provider-option {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.2s;
}
.provider-option:last-child { border-bottom: none; }
.provider-option:active { background: var(--bg-warm); }
.provider-radio {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border-accent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.25s var(--ease-out);
}
.provider-radio.selected { border-color: var(--accent); }
.provider-radio.selected::after {
  content: ''; width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent);
  animation: radioIn 0.3s var(--ease-spring);
}
@keyframes radioIn { from { transform: scale(0); } to { transform: scale(1); } }
.provider-info { flex: 1; }
.provider-name { font-size: 14px; font-weight: 500; }
.provider-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 300; }

/* ─── Utility ─── */
svg { display: block; }
.view-enter { animation: viewEnter 0.35s var(--ease-out); }
@keyframes viewEnter { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }

/* ─── Golden divider accent ─── */
.gold-line {
  height: 1px;
  margin: 0 24px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.15;
}

/* ─── Connection cards ─── */
.connections-grid { padding: 0 24px 16px; display: flex; flex-wrap: wrap; gap: 10px; }
.conn-card {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.25s var(--ease-out);
  box-shadow: var(--shadow-xs);
  flex: 1 1 calc(50% - 5px);
  min-width: 0;
}
.conn-card:active { transform: scale(0.97); background: var(--surface-warm); }
.conn-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 500; font-size: 11px;
  color: white; flex-shrink: 0;
}
.conn-info { flex: 1; min-width: 0; overflow: hidden; }
.conn-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conn-rel { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }
</style>

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const $=(s,p)=>(p||document).querySelector(s);
const h=(tag,attrs,...kids)=>{const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='class')el.className=v;else if(k==='html')el.innerHTML=v;else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else el.setAttribute(k,v)});kids.flat().forEach(c=>{if(c!=null)el.append(typeof c==='string'?c:c)});return el};
const fmtDate=d=>{if(!d)return'';try{return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}catch{return d}};
const timeAgo=d=>{const s=Math.floor((Date.now()-new Date(d))/1e3);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';if(s<2592e3)return Math.floor(s/86400)+'d ago';return fmtDate(d)};
const initials=n=>n?n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
const getColor=n=>{let v=0;for(let i=0;i<(n||'').length;i++)v=n.charCodeAt(i)+((v<<5)-v);return AVATAR_COLORS[Math.abs(v)%AVATAR_COLORS.length]};
const getSubtitle=p=>{if(p.job&&p.company)return p.job+' at '+p.company;return p.job||p.company||p.address||''};

let S={profiles:[],logs:[],view:'list',activeId:null,search:'',profileTab:'details',settings:{provider:'local',apiKey:'',model:''}};
function load(){try{S.profiles=JSON.parse(localStorage.getItem(PROFILES_KEY)||'[]')}catch{S.profiles=[]}try{S.logs=JSON.parse(localStorage.getItem(LOGS_KEY)||'[]')}catch{S.logs=[]}try{Object.assign(S.settings,JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}'))}catch{}}
function saveP(){localStorage.setItem(PROFILES_KEY,JSON.stringify(S.profiles))}
function saveL(){localStorage.setItem(LOGS_KEY,JSON.stringify(S.logs))}
function saveS(){localStorage.setItem(SETTINGS_KEY,JSON.stringify(S.settings))}
function addLog(pid,text,undoData){var entry={id:uid(),profileId:pid,text,timestamp:new Date().toISOString()};if(undoData)entry.undoData=undoData;S.logs.unshift(entry);saveL()}
function getActive(){return S.profiles.find(p=>p.id===S.activeId)}

// === RELATIONSHIP LINKING ===
var REVERSE_REL={
  'father':'Child','mother':'Child','dad':'Child','mom':'Child','parent':'Child',
  'son':'Parent','daughter':'Parent','child':'Parent',
  'brother':'Sibling','sister':'Sibling','sibling':'Sibling',
  'husband':'Spouse','wife':'Spouse','spouse':'Spouse',
  'friend':'Friend','best friend':'Friend',
  'boss':'Report','manager':'Report',
  'colleague':'Colleague','coworker':'Colleague',
  'uncle':'Niece/Nephew','aunt':'Niece/Nephew',
  'cousin':'Cousin',
  'grandfather':'Grandchild','grandmother':'Grandchild','grandpa':'Grandchild','grandma':'Grandchild',
  'grandson':'Grandparent','granddaughter':'Grandparent',
  'nephew':'Uncle/Aunt','niece':'Uncle/Aunt',
  'mother-in-law':'Child-in-law','father-in-law':'Child-in-law',
  'sister-in-law':'Sibling-in-law','brother-in-law':'Sibling-in-law',
  'partner':'Partner','girlfriend':'Partner','boyfriend':'Partner'
};

function findProfileByName(name){
  var nl=name.toLowerCase().trim();
  return S.profiles.find(function(p){return p.name.toLowerCase()===nl});
}
function findOrCreateProfile(name){
  var existing=findProfileByName(name);
  if(existing)return existing;
  var p={id:uid(),name:name.trim(),createdAt:new Date().toISOString(),summary:'',links:[]};
  S.profiles.push(p);saveP();addLog(p.id,'Profile auto-created via connection');
  return p;
}
function addLink(fromId,toId,toName,label){
  var from=S.profiles.find(function(p){return p.id===fromId});
  if(!from)return;
  if(!from.links)from.links=[];
  // Don't duplicate
  var exists=from.links.find(function(l){return l.targetId===toId});
  if(exists){exists.label=label;exists.targetName=toName;}
  else from.links.push({targetId:toId,targetName:toName,label:label});
  saveP();
}
function createBidirectionalLink(sourceId,targetName,relLabel){
  var wasNew=!findProfileByName(targetName);
  var target=findOrCreateProfile(targetName);
  var source=S.profiles.find(function(p){return p.id===sourceId});
  if(!source||!target)return null;
  addLink(sourceId,target.id,target.name,relLabel);
  var rev=REVERSE_REL[relLabel.toLowerCase()]||'Connected';
  addLink(target.id,sourceId,source.name,rev);
  return{target:target,wasNew:wasNew,reverseLabel:rev};
}
function getProfileLinks(profileId){
  var p=S.profiles.find(function(x){return x.id===profileId});
  if(!p||!p.links)return[];
  return p.links.filter(function(l){
    return S.profiles.some(function(pr){return pr.id===l.targetId});
  });
}

// === ACTIVITY DELETION WITH UNDO ===
function deleteActivity(logId){
  var log=S.logs.find(function(l){return l.id===logId});if(!log)return;
  var p=S.profiles.find(function(x){return x.id===log.profileId});
  if(log.undoData){
    var ud=log.undoData;
    // Restore previous field values
    if(ud.fieldChanges&&p){Object.keys(ud.fieldChanges).forEach(function(k){
      if(ud.fieldChanges[k]==='')delete p[k];else p[k]=ud.fieldChanges[k];
    })}
    // Remove links that were added
    if(ud.linksAdded&&ud.linksAdded.length>0){ud.linksAdded.forEach(function(lk){
      // Remove forward link from source
      var src=S.profiles.find(function(x){return x.id===lk.sourceId});
      if(src&&src.links)src.links=src.links.filter(function(l){return l.targetId!==lk.targetId});
      // Remove reverse link from target
      var tgt=S.profiles.find(function(x){return x.id===lk.targetId});
      if(tgt&&tgt.links)tgt.links=tgt.links.filter(function(l){return l.targetId!==lk.sourceId});
    })}
    // Remove auto-created profiles
    if(ud.profilesCreated&&ud.profilesCreated.length>0){ud.profilesCreated.forEach(function(pid){
      S.profiles=S.profiles.filter(function(x){return x.id!==pid});
      // Also remove any logs for that profile
      S.logs=S.logs.filter(function(l){return l.profileId!==pid});
    })}
    saveP();
  }
  // Remove the log entry itself
  S.logs=S.logs.filter(function(l){return l.id!==logId});
  saveL();
  // Regenerate summary if profile still exists
  if(p){
    var hasData=FIELD_DEFS.some(function(f){return p[f.key]})||getProfileLinks(p.id).length>0;
    if(hasData&&S.settings.provider==='local'){p.summary='';saveP();generateLocalSummary(p.id)}
    else if(!hasData){p.summary='';saveP()}
  }
  showToast('Activity deleted & changes undone');render();
}

// === LOCAL NLP (comprehensive) ===
var JOBS='engineer|designer|developer|manager|director|analyst|teacher|doctor|nurse|lawyer|accountant|consultant|therapist|chef|writer|scientist|professor|architect|artist|musician|photographer|editor|producer|officer|specialist|coordinator|student|intern|programmer|plumber|electrician|mechanic|pilot|dentist|pharmacist|surgeon|psychologist|veterinarian|librarian|journalist|realtor|agent|broker|trainer|coach|tutor|carpenter|painter|cashier|receptionist|driver|waiter|waitress|bartender|baker|welder|firefighter|paramedic|technician|clerk|secretary|assistant|associate|executive|president|ceo|cfo|cto|vp|founder|entrepreneur|freelancer|contractor|researcher|lecturer|instructor|counselor|advisor|strategist|recruiter|salesperson|marketer|auditor|actuary|paralegal|attorney|solicitor';
var RELS='wife|husband|partner|girlfriend|boyfriend|fianc[eé]+|sister|brother|mom|mother|dad|father|daughter|son|aunt|uncle|cousin|grandma|grandmother|grandpa|grandfather|niece|nephew|friend|best friend|colleague|coworker|co-worker|boss|manager|neighbor|neighbour|roommate|mentor|mentee|ex|step-?mother|step-?father|step-?sister|step-?brother|in-law|mother-in-law|father-in-law|sister-in-law|brother-in-law';
var LINK_RELS='father|mother|dad|mom|brother|sister|son|daughter|husband|wife|spouse|partner|uncle|aunt|cousin|grandfather|grandmother|grandpa|grandma|boss|friend|best friend|colleague|nephew|niece';
function clean(s){return s.trim().replace(/[.!,;]+$/,'')}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}
function tryDate(s){s=clean(s);var d=new Date(s);if(!isNaN(d)&&d.getFullYear()>1900&&d.getFullYear()<2030)return d.toISOString().split('T')[0];var s2=s.replace(/(\d+)(?:st|nd|rd|th)/gi,'$1');d=new Date(s2);if(!isNaN(d)&&d.getFullYear()>1900)return d.toISOString().split('T')[0];return null}

function localParse(text,name){
  var t=text.trim(),tl=t.toLowerCase(),up={},m=[],linkedProfiles=[];
  // Split compound sentences for multi-fact input
  var parts=[t];
  if(t.includes(' and ')&&t.length>40&&!tl.match(/(?:father|mother|dad|mom|brother|sister)(?:'s\s+name)?\s+is/i)){
    parts=t.split(/\s+and\s+/i).map(function(p){return p.trim()}).filter(Boolean);
  }
  for(var pi=0;pi<parts.length;pi++){
    var pt=parts[pi],ptl=pt.toLowerCase();
    // Cross-profile links: "her father is Gary Foster", "her father's name is Julie Foster"
    var cx1=pt.match(new RegExp("(?:her|his|their)\\s+("+LINK_RELS+")(?:'s\\s+name)?\\s+is\\s+(.+?)(?:\\s+and\\s+|$)","i"));
    if(cx1){linkedProfiles.push({name:clean(cx1[2]),label:cap(cx1[1])});m.push(cap(cx1[1])+': '+clean(cx1[2]));continue}
    var cx2=pt.match(new RegExp("(.+?)(?:'s|s')\\s+("+LINK_RELS+")(?:'s\\s+name)?\\s+is\\s+(.+?)(?:\\s+and\\s+|$)","i"));
    if(!cx1&&cx2){linkedProfiles.push({name:clean(cx2[3]),label:cap(cx2[2])});m.push(cap(cx2[2])+': '+clean(cx2[3]));continue}
    // Cross-profile links: "her father is named Julie Foster"
    var cx3=pt.match(new RegExp("(?:her|his|their)\\s+("+LINK_RELS+")\\s+is\\s+named\\s+(.+?)(?:\\s+and\\s+|$)","i"));
    if(cx3){linkedProfiles.push({name:clean(cx3[2]),label:cap(cx3[1])});m.push(cap(cx3[1])+': '+clean(cx3[2]));continue}
    // Relationship to user
    var rm=ptl.match(new RegExp("(?:she|he|they|this)?\\s*(?:is|are|'s)\\s+my\\s+("+RELS+")","i"))||ptl.match(new RegExp("^(?:my|that'?s my|this is my)\\s+("+RELS+")","i"))||ptl.match(/we(?:'re|\s+are)\s+(married|engaged|dating|friends|coworkers|colleagues|roommates|neighbors)/i);
    if(rm&&!up.relationship){var rv=clean(rm[1]);if(rv==='married')rv='Spouse';else if(rv==='engaged')rv='Fiancé(e)';else if(rv==='dating')rv='Partner';else if(rv==='friends')rv='Friend';up.relationship=cap(rv);m.push('Relationship: '+up.relationship);continue}

function generateLocalSummary(profileId){
  var p=S.profiles.find(function(x){return x.id===profileId});if(!p)return;
  var parts=[];
  if(p.relationship)parts.push(p.name+' is your '+p.relationship.toLowerCase()+'.');
  if(p.job&&p.company)parts.push((p.relationship?'They work':'Works')+' as a '+p.job+' at '+p.company+'.');
  else if(p.job)parts.push((p.relationship?'They work':'Works')+' as a '+p.job+'.');
  else if(p.company)parts.push((p.relationship?'They work':'Works')+' at '+p.company+'.');

  if(p.birthday){var age=Math.floor((Date.now()-new Date(p.birthday+'T00:00:00'))/(365.25*24*60*60*1e3));if(age>0&&age<120)parts.push('Age '+age+'.');else parts.push('Birthday: '+fmtDate(p.birthday)+'.')}

  var links=getProfileLinks(p.id);
  if(links.length>0)parts.push('Connected to '+links.map(function(l){return l.targetName+' ('+l.label+')'}).join(', ')+'.');
  var recent=S.logs.filter(function(l){return l.profileId===profileId&&!l.text.startsWith('Profile created')&&!l.text.startsWith('Summary')&&!l.text.startsWith('Linked')}).slice(0,2);
