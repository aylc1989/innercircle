<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#2C2520">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inner Circle">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Inner Circle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F6F1;
  --bg-warm: #F3F0E8;
  --surface: #FFFFFF;
  --surface-warm: #FDFCF9;
  --surface-elevated: #FFFFFF;
  --border: #E8E3DA;
  --border-light: #F0ECE4;
  --border-accent: #D4C9B8;
  --text: #2C2520;
  --text-secondary: #6B6057;
  --text-tertiary: #A39A8F;
  --text-muted: #C4BAB0;
  --accent: #B8874C;
  --accent-soft: #F5EDE0;
  --accent-glow: rgba(184,135,76,0.12);
  --green: #5E9E7E;
  --green-soft: #E8F2EC;
  --red: #C66B5E;
  --red-soft: #FAEAE7;
  --blue: #6B8EBF;
  --blue-soft: #E8EFF7;
  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --shadow-xs: 0 1px 2px rgba(44,37,32,0.04);
  --shadow-sm: 0 2px 8px rgba(44,37,32,0.06);
  --shadow: 0 4px 16px rgba(44,37,32,0.06), 0 1px 4px rgba(44,37,32,0.04);
  --shadow-lg: 0 8px 32px rgba(44,37,32,0.08), 0 2px 8px rgba(44,37,32,0.04);
  --shadow-xl: 0 16px 48px rgba(44,37,32,0.1), 0 4px 12px rgba(44,37,32,0.06);
  --shadow-inner: inset 0 1px 2px rgba(44,37,32,0.04);
  --font-body: 'Outfit', sans-serif;
  --font-display: 'Playfair Display', Georgia, serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  font-weight: 400;
  letter-spacing: 0.01em;
  -webkit-font-smoothing: antialiased;
}

/* Grain overlay for paper-like texture */
.app::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.35;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}

.app {
  max-width: 520px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
  background: var(--bg);
}

.scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

/* ─── Header ─── */
.header {
  padding: 20px 24px 0;
  flex-shrink: 0;
  background: var(--bg);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-title-text {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--text);
}
.header-title-text span {
  color: var(--accent);
}
.logo-mark {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}
.header-actions { display: flex; gap: 10px; }

/* ─── Buttons ─── */
.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-tertiary);
  transition: all 0.25s var(--ease-out);
  box-shadow: var(--shadow-xs);
}
.icon-btn:active {
  transform: scale(0.93);
  box-shadow: none;
  border-color: var(--border-accent);
  color: var(--text-secondary);
}
.icon-btn.primary {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  box-shadow: var(--shadow-sm);
}
.icon-btn.primary:active {
  background: #3D3530;
}
.icon-btn.wide {
  width: auto;
  padding: 0 18px;
  gap: 8px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.icon-btn.accent {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(184,135,76,0.25);
}

/* ─── Search ─── */
.search-wrap { position: relative; margin-bottom: 18px; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
.search-input {
  width: 100%;
  padding: 12px 14px 12px 42px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: all 0.3s var(--ease-out);
  box-shadow: var(--shadow-inner);
}
.search-input::placeholder { color: var(--text-muted); font-weight: 300; }
.search-input:focus {
  border-color: var(--accent);
  box-shadow: var(--shadow-inner), 0 0 0 3px var(--accent-glow);
}

/* ─── Birthday banner ─── */
.bday-banner {
  margin: 0 16px 14px;
  background: linear-gradient(135deg, var(--accent-soft) 0%, var(--surface) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  box-shadow: var(--shadow-xs);
}
.bday-banner-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--accent); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.bday-banner-list { display: flex; flex-direction: column; gap: 8px; }
.bday-item {
  display: flex; align-items: center; gap: 10px; cursor: pointer;
  padding: 6px 8px; border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.bday-item:hover { background: rgba(184,135,76,0.08); }
.bday-item-info { flex: 1; min-width: 0; }
.bday-item-name { font-size: 13px; font-weight: 500; }
.bday-item-date { font-size: 11px; color: var(--text-tertiary); font-weight: 400; }
.bday-item-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; flex-shrink: 0;
}
.bday-today { background: var(--accent); color: white; }
.bday-soon { background: var(--accent-soft); color: var(--accent); }

/* ─── Contact list ─── */
.contact-list { padding: 0 16px 24px; }
.contact-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 12px;
  margin-bottom: 2px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.25s var(--ease-out);
  opacity: 0;
  transform: translateY(12px);
  animation: listReveal 0.5s var(--ease-out) forwards;
}
.contact-item:active {
  background: var(--surface-warm);
  transform: scale(0.98);
}
@keyframes listReveal {
  to { opacity: 1; transform: translateY(0); }
}

/* ─── Avatar ─── */
.avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 16px;
  color: white;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  position: relative;
  letter-spacing: 0.03em;
}
.avatar::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
}
.avatar-lg {
  width: 84px;
  height: 84px;
  font-size: 26px;
  box-shadow: var(--shadow);
  animation: avatarFloat 3s ease-in-out infinite;
}
@keyframes avatarFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
.avatar-lg::after { inset: -4px; border-width: 2px; border-color: var(--accent-soft); }

.contact-info { flex: 1; min-width: 0; }
.contact-name {
  font-weight: 500;
  font-size: 15px;
  margin-bottom: 3px;
  letter-spacing: 0.01em;
}
.contact-sub {
  font-size: 13px;
  color: var(--text-tertiary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 300;
}
.contact-badge {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.relationship-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-soft);
  padding: 3px 10px;
  border-radius: 12px;
  margin-top: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ─── Profile ─── */
.profile-header {
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border-light);
}
.profile-header-title {
  font-weight: 500;
  font-size: 16px;
  flex: 1;
  letter-spacing: 0.01em;
}
.profile-hero {
  padding: 36px 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  animation: heroReveal 0.6s var(--ease-out);
}
@keyframes heroReveal {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.profile-name {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 500;
  margin-top: 18px;
  letter-spacing: -0.01em;
}
.profile-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 5px;
  font-weight: 300;
}
.profile-relationship { margin-top: 8px; }

/* ─── Summary card ─── */
.summary-card {
  margin: 0 24px 20px;
  padding: 20px;
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface-warm) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  animation: cardReveal 0.5s var(--ease-out) 0.15s both;
}
.summary-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0.5;
}
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.summary-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 12px;
}
.summary-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-secondary);
  font-style: italic;
  font-family: var(--font-display);
  font-weight: 400;
}
.summary-refresh {
  margin-left: auto;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 10px;
  font-family: var(--font-body);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: color 0.2s;
}
.summary-refresh:active { color: var(--accent); }
.pulse { animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:1} }

/* ─── Fields ─── */
.section-title {
  padding: 0 24px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 10px;
  margin-top: 8px;
}
.fields-card {
  margin: 0 24px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-xs);
  animation: cardReveal 0.5s var(--ease-out) 0.2s both;
}
.field-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 15px 18px;
  border-bottom: 1px solid var(--border-light);
  font-size: 14px;
  transition: background 0.2s;
}
.field-row:last-child { border-bottom: none; }
.field-icon {
  width: 22px;
  text-align: center;
  color: var(--accent);
  font-size: 14px;
  flex-shrink: 0;
  padding-top: 2px;
  opacity: 0.7;
}
.field-content { flex: 1; min-width: 0; }
.field-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 3px;
}
.field-value {
  color: var(--text);
  line-height: 1.6;
  word-break: break-word;
  font-weight: 400;
}

/* ─── NLP Bar ─── */
.nlp-bar {
  flex-shrink: 0;
  padding: 12px 24px;
  padding-bottom: calc(12px + var(--safe-bottom));
  background: linear-gradient(to top, var(--bg) 60%, transparent);
  border-top: 1px solid var(--border-light);
}
.nlp-inner {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 6px 6px 6px 16px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.3s var(--ease-out), border-color 0.3s;
}
.nlp-inner:focus-within {
  box-shadow: var(--shadow-lg);
  border-color: var(--border-accent);
}
.nlp-input {
  flex: 1;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  background: transparent;
  color: var(--text);
  min-width: 0;
  resize: none;
  overflow-y: hidden;
  line-height: 1.4;
  max-height: 120px;
  height: 36px;
  padding: 8px 0;
}
.nlp-input::placeholder { color: var(--text-muted); font-weight: 300; }
.nlp-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s var(--ease-out);
}
.nlp-btn:active { transform: scale(0.9); }
.nlp-send {
  background: var(--text);
  color: var(--bg);
  box-shadow: var(--shadow-sm);
}
.nlp-send:disabled { opacity: 0.2; cursor: default; }
.nlp-mic {
  background: var(--surface-warm);
  color: var(--text-tertiary);
  border: 1px solid var(--border);
}
.nlp-mic.recording {
  background: var(--red);
  color: white;
  border-color: var(--red);
  animation: pulse 1s ease-in-out infinite;
  box-shadow: 0 0 0 4px var(--red-soft);
}
.nlp-mode-tag {
  font-size: 9px;
  font-weight: 600;
  color: var(--accent);
  padding: 3px 9px;
  border-radius: 8px;
  background: var(--accent-soft);
  white-space: nowrap;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 10px;
  cursor: pointer;
  border: none;
  font-family: var(--font-body);
  transition: background 0.15s var(--ease-out), transform 0.15s var(--ease-out), color 0.15s var(--ease-out);
}
.nlp-mode-tag:hover { background: var(--accent); color: #fff; }
.nlp-mode-tag:active { transform: scale(0.94); }
.model-switcher {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 6px;
  min-width: 220px;
  max-width: 280px;
  z-index: 1000;
  animation: switcherIn 0.18s var(--ease-out);
}
@keyframes switcherIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.model-switcher-item {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  width: 100%;
  padding: 9px 12px;
  border: none;
  background: transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font-body);
  text-align: left;
  transition: background 0.15s var(--ease-out);
}
.model-switcher-item:hover { background: var(--bg-warm); }
.model-switcher-item.active { background: var(--accent-soft); }
.model-switcher-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.01em;
}
.model-switcher-item.active .model-switcher-name { color: var(--accent); }
.model-switcher-desc {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 300;
}
.model-switcher-divider {
  height: 1px;
  background: var(--border-light);
  margin: 6px 4px;
}
.model-switcher-settings .model-switcher-name { color: var(--text-tertiary); font-weight: 400; }

/* ─── Tabs ─── */
.tab-bar {
  display: flex;
  margin: 0 24px 16px;
  gap: 4px;
  background: var(--bg-warm);
  border-radius: var(--radius-sm);
  padding: 4px;
}
.tab {
  flex: 1;
  padding: 10px 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-tertiary);
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: var(--font-body);
  border-radius: 8px;
  transition: all 0.25s var(--ease-out);
  letter-spacing: 0.02em;
  text-align: center;
}
.tab.active {
  color: var(--text);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
}

/* ─── Log ─── */
.log-item {
  display: flex;
  gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.log-item:last-child { border-bottom: none; }
.log-item:hover .log-delete-btn { opacity: 1; }
.log-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  margin-top: 6px;
  flex-shrink: 0;
}
.log-dot.recent { background: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
.log-content { flex: 1; min-width: 0; }
.log-text { color: var(--text-secondary); line-height: 1.6; font-weight: 400; }
.log-time { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-weight: 400; letter-spacing: 0.02em; }
.log-delete-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  flex-shrink: 0;
  align-self: center;
  opacity: 0.4;
  transition: all 0.2s var(--ease-out);
}
.log-delete-btn:hover { opacity: 1; color: var(--red); background: var(--red-soft); }
.log-delete-btn:active { transform: scale(0.9); }
.log-delete-btn svg { width: 12px; height: 12px; }

/* ─── Edit ─── */
.edit-input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: all 0.25s var(--ease-out);
  box-shadow: var(--shadow-inner);
}
.edit-input:focus { border-color: var(--accent); box-shadow: var(--shadow-inner), 0 0 0 3px var(--accent-glow); }
.edit-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.edit-field { padding: 14px 18px; border-bottom: 1px solid var(--border-light); }
.edit-field:last-child { border-bottom: none; }
.edit-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

/* ─── Modal ─── */
.modal-overlay {
  position: fixed; inset: 0;

function getUpcomingBirthdays(days){
  var now=new Date();var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var results=[];
  S.profiles.forEach(function(p){
    if(!p.birthday)return;
    var bd=new Date(p.birthday+'T00:00:00');
    var thisYear=new Date(today.getFullYear(),bd.getMonth(),bd.getDate());
    var nextYear=new Date(today.getFullYear()+1,bd.getMonth(),bd.getDate());
    var diff=Math.floor((thisYear-today)/(24*60*60*1e3));
    if(diff<0)diff=Math.floor((nextYear-today)/(24*60*60*1e3));
    if(diff>=0&&diff<=days){
      var age=today.getFullYear()-bd.getFullYear();if(diff>0||today.getMonth()>bd.getMonth()||(today.getMonth()===bd.getMonth()&&today.getDate()>=bd.getDate())){}else{age--}
      results.push({profile:p,daysUntil:diff,age:age,dateStr:fmtDate(p.birthday)});
    }
  });
  results.sort(function(a,b){return a.daysUntil-b.daysUntil});
  return results;
}

function load(){try{S.profiles=JSON.parse(localStorage.getItem(PROFILES_KEY)||'[]')}catch{S.profiles=[]}try{S.logs=JSON.parse(localStorage.getItem(LOGS_KEY)||'[]')}catch{S.logs=[]}try{Object.assign(S.settings,JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}'))}catch{}if(!S.settings.apiKeys)S.settings.apiKeys={};if(!S.settings.models)S.settings.models={};if(S.settings.provider!=='local'&&S.settings.apiKey&&!S.settings.apiKeys[S.settings.provider]){S.settings.apiKeys[S.settings.provider]=S.settings.apiKey;if(S.settings.model)S.settings.models[S.settings.provider]=S.settings.model}
  // Backfill partner field from existing spouse/partner connections
  var changed=false;
  S.profiles.forEach(function(p){
    if(p.partner)return;
    // Check outgoing links (this person → partner)
    if(p.links){
      var pl=p.links.find(function(l){return isPartnerLabel(l.label)&&S.profiles.some(function(x){return x.id===l.targetId})});
      if(pl){p.partner=pl.targetName;changed=true;return}
    }
    // Check incoming links (partner → this person)
    var incoming=S.profiles.find(function(op){return op.links&&op.links.some(function(l){return l.targetId===p.id&&isPartnerLabel(l.label)})});
    if(incoming){p.partner=incoming.name;changed=true;return}
    // Check relationship field — if this person "is my wife/husband/etc", find who links to them
    if(p.relationship&&isPartnerLabel(p.relationship)){
      var linker=S.profiles.find(function(op){return op.links&&op.links.some(function(l){return l.targetId===p.id})});
      if(linker){p.partner=linker.name;changed=true}
    }
  });
  if(changed)saveP();
}

var REVERSE_REL={
  'father':'Child','mother':'Child','dad':'Child','mom':'Child','parent':'Child',
  'son':'Parent','daughter':'Parent','child':'Parent',
  'brother':'Sibling','sister':'Sibling','sibling':'Sibling',
  'husband':'Spouse','wife':'Spouse','spouse':'Spouse',
  'friend':'Friend','best friend':'Friend',
  'boss':'Report','manager':'Report',
  'colleague':'Colleague','coworker':'Colleague',
  'uncle':'Niece/Nephew','aunt':'Niece/Nephew',
  'cousin':'Cousin',
  'grandfather':'Grandchild','grandmother':'Grandchild','grandpa':'Grandchild','grandma':'Grandchild',
  'grandson':'Grandparent','granddaughter':'Grandparent',
  'nephew':'Uncle/Aunt','niece':'Uncle/Aunt',
  'mother-in-law':'Child-in-law','father-in-law':'Child-in-law',
  'sister-in-law':'Sibling-in-law','brother-in-law':'Sibling-in-law',
  'partner':'Partner','girlfriend':'Partner','boyfriend':'Partner'

var PARTNER_LABELS={'wife':1,'husband':1,'spouse':1,'partner':1,'girlfriend':1,'boyfriend':1,'fiancé':1,'fiancée':1,'fiance':1,'fiancee':1};
function isPartnerLabel(label){return PARTNER_LABELS[label.toLowerCase()]||false}

function findProfileByName(name){
  var nl=name.toLowerCase().trim();
  return S.profiles.find(function(p){return p.name.toLowerCase()===nl});
}
function findOrCreateProfile(name){
  var existing=findProfileByName(name);
  if(existing)return existing;
  var p={id:uid(),name:name.trim(),createdAt:new Date().toISOString(),summary:'',links:[]};
  S.profiles.push(p);saveP();addLog(p.id,'Profile auto-created via connection');
  return p;
}
function addLink(fromId,toId,toName,label){
  var from=S.profiles.find(function(p){return p.id===fromId});
  if(!from)return;
  if(!from.links)from.links=[];
  // Don't duplicate
  var exists=from.links.find(function(l){return l.targetId===toId});
  if(exists){exists.label=label;exists.targetName=toName;}
  else from.links.push({targetId:toId,targetName:toName,label:label});
  saveP();
}
function createBidirectionalLink(sourceId,targetName,relLabel){
  var wasNew=!findProfileByName(targetName);
  var target=findOrCreateProfile(targetName);
  var source=S.profiles.find(function(p){return p.id===sourceId});
  if(!source||!target)return null;
  addLink(sourceId,target.id,target.name,relLabel);
  var rev=REVERSE_REL[relLabel.toLowerCase()]||'Connected';
  addLink(target.id,sourceId,source.name,rev);
  // Auto-sync partner field for spouse/partner relationships
  if(isPartnerLabel(relLabel)){
    source.partner=target.name;
    target.partner=source.name;
    saveP();
  }
  return{target:target,wasNew:wasNew,reverseLabel:rev};
}
function getProfileLinks(profileId){
  var p=S.profiles.find(function(x){return x.id===profileId});
  if(!p||!p.links)return[];
  return p.links.filter(function(l){
    return S.profiles.some(function(pr){return pr.id===l.targetId});
  });
}
function getMutualConnections(idA,idB){
  var linksA=getProfileLinks(idA).map(function(l){return l.targetId});
  var linksB=getProfileLinks(idB).map(function(l){return l.targetId});
  return linksA.filter(function(id){return id!==idA&&id!==idB&&linksB.indexOf(id)!==-1});
}
function removeConnection(sourceId,targetId){
  var src=S.profiles.find(function(x){return x.id===sourceId});
  var tgt=S.profiles.find(function(x){return x.id===targetId});
  // Check if this was a partner link before removing
  var wasPartner=false;
  if(src&&src.links){var lnk=src.links.find(function(l){return l.targetId===targetId});if(lnk&&isPartnerLabel(lnk.label))wasPartner=true}
  if(src&&src.links)src.links=src.links.filter(function(l){return l.targetId!==targetId});
  if(tgt&&tgt.links)tgt.links=tgt.links.filter(function(l){return l.targetId!==sourceId});
  // Clear partner fields if it was a partner connection
  if(wasPartner){
    if(src&&src.partner&&tgt&&src.partner.toLowerCase()===tgt.name.toLowerCase()){src.partner=''}
    if(tgt&&tgt.partner&&src&&tgt.partner.toLowerCase()===src.name.toLowerCase()){tgt.partner=''}
  }
  saveP();
  addLog(sourceId,'Removed connection to '+(tgt?tgt.name:'unknown'));
  showToast('Connection removed');render();
}
function syncPartnerToConnection(profile){
  // If partner field changed, update the matching spouse/partner connection
  var links=getProfileLinks(profile.id);
  var partnerLink=links.find(function(l){return isPartnerLabel(l.label)});
  if(profile.partner&&profile.partner.trim()){
    var newName=profile.partner.trim();
    if(partnerLink){
      // Update existing partner connection's name
      var tgt=S.profiles.find(function(x){return x.id===partnerLink.targetId});
      if(tgt&&tgt.name.toLowerCase()!==newName.toLowerCase()){
        // Update the link target name
        var lnk=profile.links.find(function(l){return l.targetId===partnerLink.targetId});
        if(lnk)lnk.targetName=newName;
        // Update the target profile's name and their reverse link
        tgt.name=newName;
        var revLnk=tgt.links?tgt.links.find(function(l){return l.targetId===profile.id}):null;
        if(revLnk)revLnk.targetName=profile.name;
        // Update target's partner field too
        tgt.partner=profile.name;
      }
    } else {
      // No partner connection exists, create one
      createBidirectionalLink(profile.id,newName,'Partner');
    }
  } else if(partnerLink&&!profile.partner){
    // Partner field cleared, remove the connection
    removeConnection(profile.id,partnerLink.targetId);
  }
  saveP();
}

// Silently rebuild summary text without logging, toasting, or re-rendering
function rebuildSummary(p){
  var parts=[];
  if(p.relationship)parts.push(p.name+' is your '+p.relationship.toLowerCase()+'.');
  if(p.job&&p.company)parts.push((p.relationship?'They work':'Works')+' as a '+p.job+' at '+p.company+'.');
  else if(p.job)parts.push((p.relationship?'They work':'Works')+' as a '+p.job+'.');
  else if(p.company)parts.push((p.relationship?'They work':'Works')+' at '+p.company+'.');
  if(p.address)parts.push('Based in '+p.address+'.');
  if(p.partner)parts.push('Partner: '+p.partner+'.');
  if(p.children)parts.push('Children: '+p.children+'.');
  if(p.pets)parts.push('Pets: '+p.pets+'.');
  if(p.birthday){var age=Math.floor((Date.now()-new Date(p.birthday+'T00:00:00'))/(365.25*24*60*60*1e3));if(age>0&&age<120)parts.push('Age '+age+'.');else parts.push('Birthday: '+fmtDate(p.birthday)+'.')}
  if(p.interests)parts.push('Enjoys '+p.interests+'.');
  var links=getProfileLinks(p.id);
  if(links.length>0)parts.push('Connected to '+links.map(function(l){return l.targetName+' ('+l.label+')'}).join(', ')+'.');
  p.summary=parts.length>0?parts.join(' '):'';
  saveP();
}

// === ACTIVITY DELETION WITH UNDO ===
function deleteActivity(logId){
  var log=S.logs.find(function(l){return l.id===logId});if(!log)return;
  var p=S.profiles.find(function(x){return x.id===log.profileId});
  if(log.undoData){
    var ud=log.undoData;
    // Restore previous field values
    if(ud.fieldChanges&&p){Object.keys(ud.fieldChanges).forEach(function(k){
      if(ud.fieldChanges[k]==='')delete p[k];else p[k]=ud.fieldChanges[k];
    })}
    // Remove links that were added
    if(ud.linksAdded&&ud.linksAdded.length>0){ud.linksAdded.forEach(function(lk){
      // Remove forward link from source
      var src=S.profiles.find(function(x){return x.id===lk.sourceId});
      if(src&&src.links)src.links=src.links.filter(function(l){return l.targetId!==lk.targetId});
      // Remove reverse link from target
      var tgt=S.profiles.find(function(x){return x.id===lk.targetId});
      if(tgt&&tgt.links)tgt.links=tgt.links.filter(function(l){return l.targetId!==lk.sourceId});
    })}
    // Remove auto-created profiles
    if(ud.profilesCreated&&ud.profilesCreated.length>0){ud.profilesCreated.forEach(function(pid){
      S.profiles=S.profiles.filter(function(x){return x.id!==pid});
      // Also remove any logs for that profile
      S.logs=S.logs.filter(function(l){return l.profileId!==pid});
    })}
    saveP();
  }
  // Remove the log entry itself
  S.logs=S.logs.filter(function(l){return l.id!==logId});
  saveL();
  // Silently regenerate summary if profile still exists
  if(p){
    var hasData=FIELD_DEFS.some(function(f){return p[f.key]})||getProfileLinks(p.id).length>0;
    if(hasData){rebuildSummary(p)}
    else{p.summary='';saveP()}
  }
  showToast('Activity deleted & changes undone');
  render();
}

function tryDate(s){s=clean(s);var d=new Date(s);if(!isNaN(d)&&d.getFullYear()>1900&&d.getFullYear()<2030)return d.toISOString().split('T')[0];var s2=s.replace(/(\d+)(?:st|nd|rd|th)/gi,'$1');d=new Date(s2);if(!isNaN(d)&&d.getFullYear()>1900)return d.toISOString().split('T')[0];return null}

function localParse(text,name){
  var t=text.trim(),tl=t.toLowerCase(),up={},m=[],linkedProfiles=[];
  // Split compound sentences for multi-fact input
  var parts=[t];
  if(t.includes(' and ')&&t.length>40&&!tl.match(/(?:father|mother|dad|mom|brother|sister)(?:'s\s+name)?\s+is/i)){
    parts=t.split(/\s+and\s+/i).map(function(p){return p.trim()}).filter(Boolean);
  }
  for(var pi=0;pi<parts.length;pi++){
    var pt=parts[pi],ptl=pt.toLowerCase();
    // Cross-profile links: "her father is Gary Foster", "her father's name is Julie Foster"
    var cx1=pt.match(new RegExp("(?:her|his|their)\\s+("+LINK_RELS+")(?:'s\\s+name)?\\s+is\\s+(.+?)(?:\\s+and\\s+|$)","i"));
    if(cx1){var cxLabel=cap(cx1[1]),cxName=clean(cx1[2]);linkedProfiles.push({name:cxName,label:cxLabel});m.push(cxLabel+': '+cxName);if(/^(husband|wife|spouse|partner)$/i.test(cxLabel)&&!up.partner){up.partner=cxName}continue}
    var cx2=pt.match(new RegExp("(.+?)(?:'s|s')\\s+("+LINK_RELS+")(?:'s\\s+name)?\\s+is\\s+(.+?)(?:\\s+and\\s+|$)","i"));
    if(!cx1&&cx2){var cx2Label=cap(cx2[2]),cx2Name=clean(cx2[3]);linkedProfiles.push({name:cx2Name,label:cx2Label});m.push(cx2Label+': '+cx2Name);if(/^(husband|wife|spouse|partner)$/i.test(cx2Label)&&!up.partner){up.partner=cx2Name}continue}
    // Cross-profile links: "her father is named Julie Foster"
    var cx3=pt.match(new RegExp("(?:her|his|their)\\s+("+LINK_RELS+")\\s+is\\s+named\\s+(.+?)(?:\\s+and\\s+|$)","i"));
    if(cx3){var cx3Label=cap(cx3[1]),cx3Name=clean(cx3[2]);linkedProfiles.push({name:cx3Name,label:cx3Label});m.push(cx3Label+': '+cx3Name);if(/^(husband|wife|spouse|partner)$/i.test(cx3Label)&&!up.partner){up.partner=cx3Name}continue}
    // Relationship to user

function generateLocalSummary(profileId){
  var p=S.profiles.find(function(x){return x.id===profileId});if(!p)return;
  var parts=[];
  if(p.relationship)parts.push(p.name+' is your '+p.relationship.toLowerCase()+'.');
  if(p.job&&p.company)parts.push((p.relationship?'They work':'Works')+' as a '+p.job+' at '+p.company+'.');
  else if(p.job)parts.push((p.relationship?'They work':'Works')+' as a '+p.job+'.');
  else if(p.company)parts.push((p.relationship?'They work':'Works')+' at '+p.company+'.');
  if(p.address)parts.push('Based in '+p.address+'.');
  if(p.partner)parts.push('Partner: '+p.partner+'.');
  if(p.children)parts.push('Children: '+p.children+'.');
  if(p.pets)parts.push('Pets: '+p.pets+'.');
  if(p.birthday){var age=Math.floor((Date.now()-new Date(p.birthday+'T00:00:00'))/(365.25*24*60*60*1e3));if(age>0&&age<120)parts.push('Age '+age+'.');else parts.push('Birthday: '+fmtDate(p.birthday)+'.')}

  var recent=S.logs.filter(function(l){return l.profileId===profileId&&!l.text.startsWith('Profile created')&&!l.text.startsWith('Summary')&&!l.text.startsWith('Linked')}).slice(0,2);

  if(parts.length>0){p.summary=parts.join(' ');saveP();addLog(p.id,'Summary updated');showToast('Summary generated');render()}
  else showToast('Add some details first');
}

function toggleRec(inp){
  if(isRec){recog?.stop();isRec=false;render();return}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){showToast('Speech not supported');return}
  recog=new SR();recog.continuous=false;recog.interimResults=true;recog.lang='en-US';
  recog.onresult=function(e){
    var transcript=e.results[0][0].transcript;
    if(e.results[0].isFinal){inp.value=transcript;autoResizeInput(inp);processNLP(transcript,inp)}
    else{inp.value=transcript;autoResizeInput(inp)}

}

function exportData(){var d={profiles:S.profiles,logs:S.logs,exportedAt:new Date().toISOString()};var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='inner-circle-'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(a.href);showToast('Exported')}
function importData(){var i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.profiles){S.profiles=d.profiles;saveP()}if(d.logs){S.logs=d.logs;saveL()}render();showToast('Imported')}catch(err){showToast('Invalid file')}};r.readAsText(f)};i.click()}
async function backupToDrive(){
  var d={profiles:S.profiles,logs:S.logs,exportedAt:new Date().toISOString()};
  var json=JSON.stringify(d,null,2);
  var filename='inner-circle-'+new Date().toISOString().split('T')[0]+'.json';
  // Try Web Share with files. Some Android Chrome versions reject
  // application/json in canShare, so fall back to text/plain (the file
  // contents are still JSON, the extension is preserved).
  if(navigator.canShare){
    var mimes=['application/json','text/plain'];
    for(var i=0;i<mimes.length;i++){
      var file=new File([new Blob([json],{type:mimes[i]})],filename,{type:mimes[i]});
      if(navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file],title:'Inner Circle Backup',text:'Inner Circle backup '+filename});
          showToast('Shared');
          return;
        }catch(err){
          if(err&&err.name==='AbortError'){showToast('Share cancelled');return}
          break;
        }
      }
    }
  }
  // No share support at all \u2014 download and open Drive in a new tab.
  exportData();
  window.open('https://drive.google.com/drive/my-drive','_blank');
  showToast('File downloaded \u2014 upload to Drive');
}

if('serviceWorker' in navigator){
  var refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(refreshing)return;
    refreshing=true;
    window.location.reload();
  });
  navigator.serviceWorker.register('sw.js',{updateViaCache:'none'}).then(function(reg){
    // Check for updates every 30 minutes
    setInterval(function(){reg.update()},1800000);
    // Also check when the user returns to the app. visibilitychange covers
    // foreground/background; pageshow covers iOS back-forward cache restores
    // where visibilitychange may not fire.
    document.addEventListener('visibilitychange',function(){
      if(!document.hidden)reg.update();
    });
    window.addEventListener('pageshow',function(){reg.update()});
    reg.addEventListener('updatefound',function(){
      var newWorker=reg.installing;
      if(!newWorker)return;
      newWorker.addEventListener('statechange',function(){
        if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
          // New version ready — tell it to activate immediately
          newWorker.postMessage({type:'SKIP_WAITING'});
        }
      });
    });
  }).catch(function(){});
}
